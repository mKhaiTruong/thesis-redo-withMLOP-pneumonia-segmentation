  prefect:
    image: prefecthq/prefect:3-latest
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "7867:7860"
    env_file: .env
    depends_on:
      - prefect
      - ingestion
      - transformation
      - data_drift

