services:
  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    ports:
      - "7861:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts

  transformation:
    build:
      context: .
      dockerfile: services/transformation/Dockerfile
    ports:
      - "7862:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - ingestion

  data_drift:
    build:
      context: .
      dockerfile: services/data_drift/Dockerfile
    ports:
      - "7863:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - transformation

