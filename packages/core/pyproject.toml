[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pnseg-core"
version = "0.1.0"
dependencies = [
    "pyyaml",
    "python-box",
    "ensure",
    "joblib",
    "onnxruntime",
    "numpy",
    "mlflow",
    "fastapi",
    "uvicorn",
    "opencv-python-headless",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["core*"]