apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect
  template:
    metadata:
      labels:
        app: prefect
    spec:
      containers:
        - name: prefect
          image: prefecthq/prefect:3-latest
          command: ["prefect", "server", "start", "--host", "0.0.0.0"]
          ports:
            - containerPort: 4200
          volumeMounts:
            - name: prefect-data
              mountPath: /root/.prefect
      volumes:
        - name: prefect-data
          persistentVolumeClaim:
            claimName: artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prefect
spec:
  selector:
    app: prefect
  ports:
    - port: 4200
      targetPort: 4200
  type: ClusterIP
