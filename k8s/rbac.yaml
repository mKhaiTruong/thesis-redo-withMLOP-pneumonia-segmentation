apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orchestrator-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs:     ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs:     ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orchestrator-binding
subjects:
  - kind: ServiceAccount
    name: orchestrator-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: orchestrator-role
  apiGroup: rbac.authorization.k8s.io
