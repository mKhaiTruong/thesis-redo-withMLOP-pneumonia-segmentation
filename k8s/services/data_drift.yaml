apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-drift
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-drift
  template:
    metadata:
      labels:
        app: data-drift
    spec:
      containers:
        - name: data-drift
          image: bill123mk/pneumonia_mlops:data_drift
          imagePullPolicy: Always
          ports:
            - containerPort: 7860
          envFrom:
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: data-drift
spec:
  selector:
    app: data-drift
  ports:
    - port: 7860
      targetPort: 7860
  type: ClusterIP
