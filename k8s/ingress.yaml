apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pneumonia-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: pneumonia.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 7860
          - path: /ai-manager
            pathType: Prefix
            backend:
              service:
                name: ai-manager
                port:
                  number: 7860
          - path: /lstm
            pathType: Prefix
            backend:
              service:
                name: lstm
                port:
                  number: 7860
          - path: /orchestrator
            pathType: Prefix
            backend:
              service:
                name: orchestrator
                port:
                  number: 7860
          - path: /claude-architecture
            pathType: Prefix
            backend:
              service:
                name: claude-architecture
                port:
                  number: 7860
          - path: /ingestion
            pathType: Prefix
            backend:
              service:
                name: ingestion
                port:
                  number: 7860
          - path: /transformation
            pathType: Prefix
            backend:
              service:
                name: transformation
                port:
                  number: 7860
          - path: /data-drift
            pathType: Prefix
            backend:
              service:
                name: data-drift
                port:
                  number: 7860
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /prefect
            pathType: Prefix
            backend:
              service:
                name: prefect
                port:
                  number: 4200
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix
  namespace: default
spec:
  stripPrefix:
    prefixes:
      - /ai-manager
      - /lstm
      - /orchestrator
      - /claude-architecture
      - /ingestion
      - /transformation
      - /data-drift
      - /prometheus
      - /prefect
