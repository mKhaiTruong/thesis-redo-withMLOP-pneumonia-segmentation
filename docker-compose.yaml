services:
  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    ports:
      - "7861:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts

  transformation:
    build:
      context: .
      dockerfile: services/transformation/Dockerfile
    ports:
      - "7862:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - ingestion

  data_drift:
    build:
      context: .
      dockerfile: services/data_drift/Dockerfile
    ports:
      - "7863:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - transformation

  # prepare_base_model:
  #   build:
  #     context: .
  #     dockerfile: services/prepare_base_model/Dockerfile
  #   ports:
  #     - "7864:7860"
  #   env_file: .env
  #   volumes:
  #     - ./artifacts:/app/artifacts

  prefect:
    image: prefecthq/prefect:3-latest
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "7867:7860"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - prefect
      - ingestion
      - transformation
      - data_drift

  lstm:
    build:
      context: .
      dockerfile: services/lstm/Dockerfile
    ports:
      - "7868:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts

  dqn:
    build:
      context: .
      dockerfile: services/dqn/Dockerfile
    ports:
      - "7869:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts

  claude_validation:
    build:
      context: .
      dockerfile: services/claude_validation/Dockerfile
    ports:
      - "7871:7860"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts

  claude_architecture:
    build:
      context: .
      dockerfile: services/claude_architecture/Dockerfile
    ports:
      - "7872:7860"
    env_file: .env
    depends_on:
      - prometheus
      - orchestrator

  # --------------------------- INFERENCE ---------------------------
  app:
    build: .
    # ports:
    #   - "7880:7860"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    ports:
      - "7860:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # ---------------------------------------------------------------

  ai_manager:
    build:
      context: .
      dockerfile: services/ai_manager/Dockerfile
    ports:
      - "7870:7860"
    env_file: .env
    depends_on:
      - lstm
      - dqn
      - claude_validation
      - orchestrator
      - prometheus

volumes:
  grafana_data:
